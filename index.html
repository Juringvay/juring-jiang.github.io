<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">
</head>
<body>

<aside class="sidebar">
  <a class="site-title" href="./">青石玄霄</a>
  <p class="site-desc">个人博客，记录思考与交易。</p>

  <div class="sidebar-nav">
    <a href="./" class="active">文章</a>
    <a href="about.html">关于</a>
  </div>

  <div class="sidebar-cats">
    <span class="cat-label">分类</span>
    <a href="./">全部</a>
    <a href="?tag=复盘">复盘</a>
    <a href="?tag=个人随笔">个人随笔</a>
  </div>
</aside>

<main class="main">
  <div class="hero">
    <h1>文章</h1>
    <p>一些记录与思考。</p>
  </div>

  <ul class="post-list">
    <li class="post-card">
      <a href="posts/m20-pullback.html">
        <h2>2026年6月21日复盘</h2>
        <div class="meta">2026-06-21</div>
        <p class="excerpt">基于五步检查法筛选AI算力主线标的：沪电股份、博威合金、胜宏科技。当前大环境研判：等待&gt;行动，等主线第一次大分歧后的真龙头回踩。</p>
        <div class="tags">
          <a class="tag" href="?tag=复盘">复盘</a>
          <a class="tag" href="?tag=选股">选股</a>
        </div>
      </a>
    </li>
    <li class="post-card">
      <a href="posts/hello-world.html">
        <h2>Hello World — 博客的第一篇文章</h2>
        <div class="meta">2026-06-21</div>
        <p class="excerpt">记录这个博客从零到一的搭建过程，以及为什么要写博客。</p>

          <a class="tag" href="?tag=个人随笔">个人随笔</a>

  <footer>

  </footer>
</main>

<script>
(function(){
  var params = new URLSearchParams(location.search);
  var tag = params.get('tag');
  if (!tag) return;
  var cards = document.querySelectorAll('.post-card');
  var any = false;
  cards.forEach(function(c){
    var tags = c.querySelectorAll('.tag');
    var match = false;
    tags.forEach(function(t){
      if (t.textContent.trim() === tag) match = true;
    });
    if (!match) { c.style.display = 'none'; }
    else { any = true; }
  });
  if (!any) {
    document.querySelector('.hero h1').textContent = '没有「' + tag + '」分类的文章';
    document.querySelector('.hero p').textContent = '';
  } else {
    document.querySelector('.hero h1').textContent = tag;
    document.querySelector('.hero p').textContent = '';
  }
  document.querySelectorAll('.sidebar-cats a').forEach(function(a){
    a.classList.toggle('active', a.getAttribute('href') === '?tag=' + tag);
  });
})();
</script>

</body>
</html>
